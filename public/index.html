<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المياه - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css?v=1776034045">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">💧</div>
            <h1>نظام إدارة المياه</h1>
            <p style="color: #6c757d; margin-bottom: 24px;">أدخل بيانات الدخول للمتابعة</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" class="form-control" name="username" id="loginUsername" 
                           placeholder="أدخل اسم المستخدم" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-control" name="password" id="loginPassword" 
                           placeholder="أدخل كلمة المرور" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">🔐 تسجيل الدخول</span>
                </button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.8rem; color: #999;">الإصدار 1.0.0</p>
        </div>
    </div>

    <script src="js/app.js?v=1776034045"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            setButtonLoading(btn, true);
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            await login(username, password);
            setButtonLoading(btn, false);
        });

        setupEnterNavigation('loginForm');

        // Check if already logged in
        (async () => {
            const user = await checkAuth();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        })();
    </script>
</body>
</html>
